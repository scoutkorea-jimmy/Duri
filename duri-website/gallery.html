<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두리손잡고 — 사진갤러리</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:34px}
.fb{padding:10px 20px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:14.5px;color:var(--body);cursor:pointer;transition:.18s}
.fb.active{background:var(--brand);border-color:var(--brand);color:#fff}
.masonry{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:200px;gap:18px}
.tile{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer}
.tile .ph{position:absolute;inset:0}
.tile .ph::after{content:"";position:absolute;inset:0;opacity:.45;mix-blend-mode:overlay;background-image:radial-gradient(rgba(255,255,255,.7) 1px,transparent 1.4px);background-size:14px 14px}
.tile .cap{position:absolute;left:0;right:0;bottom:0;padding:16px;color:#fff;font-weight:700;font-size:15px;z-index:2;background:linear-gradient(transparent,rgba(16,49,33,.72));transform:translateY(6px);opacity:.92;transition:.25s}
.tile:hover .cap{transform:none;opacity:1}
.tile .yr{position:absolute;top:14px;left:14px;z-index:2;font-size:12px;font-weight:700;color:#fff;background:rgba(0,0,0,.25);padding:4px 10px;border-radius:999px;backdrop-filter:blur(4px)}
.tile.w2{grid-column:span 2}
.tile.h2{grid-row:span 2}
.g1{background:linear-gradient(135deg,var(--green-300),var(--green-600))}
.g2{background:linear-gradient(135deg,var(--green-400),var(--green-800))}
.g3{background:linear-gradient(150deg,var(--green-200),var(--green-400) 60%,var(--amber-200))}
.g4{background:linear-gradient(135deg,var(--green-500),var(--green-700))}
.g5{background:linear-gradient(135deg,var(--amber-200),var(--green-400))}
@media (max-width:880px){.masonry{grid-template-columns:repeat(2,1fr);grid-auto-rows:170px}.tile.w2{grid-column:span 2}}
@media (max-width:520px){.masonry{grid-template-columns:1fr;grid-auto-rows:200px}.tile.w2,.tile.h2{grid-column:auto;grid-row:auto}}
</style>
</head>
<body>

<section class="page-hero">
  <div class="container">
    <div class="crumb"><a href="index.html">홈</a> <span>›</span> 두리손잡고 소식 <span>›</span> 사진갤러리</div>
    <h1>사진갤러리</h1>
    <p>두리손잡고 가족들의 가슴 따스해지는 순간들을 모았습니다.</p>
    <div class="pills"><span class="chip">공지사항</span><span class="chip">사진갤러리</span></div>
  </div>
</section>

<section class="section section--paper">
  <div class="container">
    <div class="filter-row reveal">
      <button class="fb active">전체</button>
      <button class="fb">작업 현장</button>
      <button class="fb">프로그램 활동</button>
      <button class="fb">행사 · 나들이</button>
      <button class="fb">생산 설비</button>
    </div>

    <div class="masonry reveal">
      <div class="tile w2 h2"><div class="ph g1"></div><span class="yr">2024</span><span class="cap">보호작업장 작업 현장</span></div>
      <div class="tile"><div class="ph g3"></div><span class="cap">점보롤 생산 공정</span></div>
      <div class="tile"><div class="ph g4"></div><span class="cap">검수 · 포장 작업</span></div>
      <div class="tile w2"><div class="ph g2"></div><span class="yr">2023</span><span class="cap">CHALLENGE 체육교실</span></div>
      <div class="tile h2"><div class="ph g5"></div><span class="cap">숲체험 나들이</span></div>
      <div class="tile"><div class="ph g4"></div><span class="cap">보호자 간담회</span></div>
      <div class="tile"><div class="ph g1"></div><span class="cap">직무 적응 훈련</span></div>
      <div class="tile w2"><div class="ph g3"></div><span class="cap">자원봉사 활동</span></div>
      <div class="tile"><div class="ph g2"></div><span class="cap">생산 설비 점검</span></div>
      <div class="tile"><div class="ph g5"></div><span class="cap">CHALLENGE COOK</span></div>
      <div class="tile w2"><div class="ph g1"></div><span class="yr">2025</span><span class="cap">두리손잡고 가족 한마당</span></div>
      <div class="tile"><div class="ph g4"></div><span class="cap">페이퍼타올 적재</span></div>
    </div>
    <p class="center muted reveal" style="margin-top:30px;font-size:14px">※ 갤러리 이미지는 추후 실제 사진으로 교체됩니다. (장애우 사진 10장 내외, 작업·설비 사진 등)</p>
  </div>
</section>

<script src="assets/site.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두리손잡고 — 공지사항</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
.notice-intro{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;margin-bottom:48px}
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:11px 22px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:15px;color:var(--body);cursor:pointer;transition:.18s}
.tab.active{background:var(--brand);border-color:var(--brand);color:#fff}
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.search{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line-strong);border-radius:999px;padding:9px 16px;background:#fff;min-width:240px}
.search input{border:none;outline:none;font-family:inherit;font-size:15px;flex:1;background:transparent;color:var(--ink)}
.search svg{width:18px;height:18px;color:var(--muted)}
.tag-pill{display:inline-block;padding:3px 11px;border-radius:6px;font-size:12.5px;font-weight:700;margin-right:8px}
.tag-pill.notice{background:var(--brand-soft);color:var(--brand-deep)}
.tag-pill.news{background:var(--amber-100);color:var(--amber-600)}
.pager{display:flex;justify-content:center;gap:8px;margin-top:40px}
.pager button{width:42px;height:42px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-weight:700;color:var(--body);cursor:pointer;transition:.18s}
.pager button.active{background:var(--brand);border-color:var(--brand);color:#fff}
@media (max-width:760px){.notice-intro{grid-template-columns:1fr;gap:20px}.board-row{grid-template-columns:48px 1fr;gap:12px}.board-row .dt{grid-column:2;text-align:left;margin-top:2px}}
</style>
</head>
<body>

<section class="page-hero">
  <div class="container">
    <div class="crumb"><a href="index.html">홈</a> <span>›</span> 두리손잡고 소식 <span>›</span> 공지사항</div>
    <h1>두리손잡고 공지사항</h1>
    <p>모두가 함께하는 두리손잡고의 소식입니다.</p>
    <div class="pills"><a class="chip" href="notice.html">공지사항</a><a class="chip" href="gallery.html">사진갤러리</a></div>
  </div>
</section>

<section class="section section--paper">
  <div class="container">
    <div class="notice-intro reveal">
      <div>
        <span class="eyebrow">NOTICE</span>
        <h2 class="h2" style="margin-top:14px">중요한 정보와 소식을<br>이곳에서 전합니다</h2>
      </div>
      <p class="muted">소중한 두리손잡고 가족들에게 중요한 정보와 소식을 전달하는 공간입니다. 두리손잡고의 주요 일정, 활동 소식, 사회적인 변화에 대한 내용이 업로드됩니다.</p>
    </div>

    <div class="tabs reveal" id="tabs">
      <button class="tab active">전체</button>
      <button class="tab">공지사항</button>
      <button class="tab">새소식</button>
      <button class="tab">언론보도</button>
    </div>

    <div class="toolbar reveal">
      <p class="muted" style="font-size:15px">총 <b id="postCount" style="color:var(--brand-deep)">0</b>건의 게시물</p>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchInput" placeholder="제목으로 검색">
        </div>
        <button class="btn-write" id="writeBtn" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          글쓰기
        </button>
      </div>
    </div>

    <div class="board reveal" id="board"></div>

    <div class="pager reveal" id="pager"></div>
    <p class="center muted reveal" style="margin-top:24px;font-size:14px">※ 글쓰기는 관리자 로그인 후 이용할 수 있습니다. (우측 상단 ‘로그인’ · 임시 계정 admin / admin)</p>
  </div>
</section>

<script src="assets/site.js"></script>
<script src="assets/board.js"></script>
</body>
</html>
